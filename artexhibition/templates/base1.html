{% load static %}
<!DOCTYPE html>
<html lang="zxx" class="no-js">
<head>
    
    <!-- Site Title -->
    <title>ArtNexus||Home Page</title>

    <link href="https://fonts.googleapis.com/css?family=Poppins:100,200,400,300,500,600,700" rel="stylesheet"> 
        <!--
        CSS
        ============================================= -->
        <link rel="stylesheet" href="{% static 'css/linearicons.css'%}">
        <link rel="stylesheet" href="{% static 'css/font-awesome.min.css'%}">
        <link rel="stylesheet" href="{% static 'css/bootstrap.css'%}">
        <link rel="stylesheet" href="{% static 'css/magnific-popup.css'%}">
        <link rel="stylesheet" href="{% static 'css/nice-select.css'%}">					
        <link rel="stylesheet" href="{% static 'css/animate.min.css'%}">
        <link rel="stylesheet" href="{% static 'css/owl.carousel.css'%}">
        <link rel="stylesheet" href="{% static 'css/main.css'%}">

    <style>
    /* CHAT BUTTON */
    /* CHAT BUTTON */
        #chat-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(45deg, #10a37f, #0ea5e9);
            color: white;
            font-size: 22px;
            padding: 15px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }
        #chat-btn:hover {
            transform: scale(1.1);
        }

        /* NOTIFICATION DOT */
        #notif-dot {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 10px;
            height: 10px;
            background: red;
            border-radius: 50%;
            display: none;
        }

        /* CHAT BOX */
        #chat-box {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 350px;
            height: 500px;
            background: #0f172a;
            border-radius: 15px;
            flex-direction: column;
            overflow: hidden;

            opacity: 0;
            transform: translateY(30px) scale(0.95);
            transition: all 0.3s ease;
            pointer-events: none;
        }

        /* ACTIVE STATE */
        #chat-box.active {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
            display: flex;
        }

        /* HEADER */
        #chat-header {
            background: #020617;
            color: white;
            padding: 12px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        /* BODY */
        #chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        /* FOOTER */
        #chat-footer {
            display: flex;
            border-top: 1px solid #333;
        }

        #chat-footer input {
            flex: 1;
            padding: 10px;
            border: none;
            background: #1e293b;
            color: white;
        }

        #chat-footer button {
            background: #10a37f;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
        }

        /* MESSAGE */
        .msg {
            margin: 8px 0;
            display: flex;
            animation: fadeInUp 0.3s ease;
        }

        .user { justify-content: flex-end; }
        .bot { justify-content: flex-start; }

        .bubble {
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 80%;
            font-size: 14px;
        }

        .user .bubble {
            background: #10a37f;
            color: white;
        }

        .bot .bubble {
            background: #1e293b;
            color: white;
        }

        /* TYPING DOTS */
        .typing-dots span {
            animation: blink 1.4s infinite;
            font-size: 20px;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%,80%,100% { opacity: 0; }
            40% { opacity: 1; }
        }

        /* ANIMATION */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }
    </style>

    </head>
    <body>

        {% include 'includes1/header.html' %}


        {% block content %}
        {% endblock %}
        {% include 'includes1/footer.html' %}	

        <script src="{% static 'js/vendor/jquery-2.2.4.min.js'%}"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
        <script src="{% static 'js/vendor/bootstrap.min.js'%}"></script>			
        <script type="text/javascript" src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBhOdIF3Y9382fqJYt5I_sswSrEw5eihAA"></script>
          <script src="{% static 'js/easing.min.js'%}"></script>			
        <script src="{% static 'js/hoverIntent.js'%}"></script>
        <script src="{% static 'js/superfish.min.js'%}"></script>	
        <script src="{% static 'js/jquery.ajaxchimp.min.js'%}"></script>
        <script src="{% static 'js/jquery.magnific-popup.min.js'%}"></script>	
        <script src="{% static 'js/owl.carousel.min.js'%}"></script>	
        <script src="{% static 'js/imagesloaded.pkgd.min.js'%}"></script>
        <script src="{% static 'js/justified.min.js'%}"></script>					
        <script src="{% static 'js/jquery.sticky.js'%}"></script>
        <script src="{% static 'js/jquery.nice-select.min.js'%}"></script>			
        <script src="{% static 'js/parallax.min.js'%}"></script>		
        <script src="{% static 'js/mail-script.js'%}"></script>	
        <script src="{% static 'js/main.js'%}"></script>	

        <!-- 💬 Chat Button -->
        <div id="chat-btn" onclick="toggleChat()">
            💬 <span id="notif-dot"></span>
        </div>

        <!-- 💬 Chatbox -->
        <div id="chat-box">
            <div id="chat-header">
                🤖 ArtNexus Bot
                <span onclick="toggleChat()">✖</span>
            </div>

            <div id="chat-body"></div>

            <div id="chat-footer">
                <input type="text" id="msg" placeholder="Type message...">
                <button onclick="sendMsg()">➤</button>
            </div>
        </div>
        <script>
            let messages = [];

            // ENTER KEY
            document.getElementById("msg").addEventListener("keypress", function(e) {
                if (e.key === "Enter") sendMsg();
            });

            // TOGGLE CHAT
            function toggleChat() {
                let box = document.getElementById("chat-box");
                box.classList.toggle("active");

                document.getElementById("notif-dot").style.display = "none";
            }

            // NOTIFICATION
            function showNotification() {
                let box = document.getElementById("chat-box");
                if (!box.classList.contains("active")) {
                    document.getElementById("notif-dot").style.display = "block";
                }
            }

            // ADD MESSAGE
            function addMessage(content, type) {
                let chat = document.getElementById("chat-body");

                let msgDiv = document.createElement("div");
                msgDiv.classList.add("msg", type);

                let bubble = document.createElement("div");
                bubble.classList.add("bubble");
                bubble.innerHTML = content;

                msgDiv.appendChild(bubble);
                chat.appendChild(msgDiv);

                chat.scrollTop = chat.scrollHeight;

                return bubble;
            }

            // FORMAT RESPONSE
            function formatResponse(text) {
                return text
                    .replace(/!\[(.*?)\]\((.*?)\)/g, "<br><img src='$2' style='max-width:100%; border-radius:10px; margin-top:5px;'/>") 
                    .replace(/\n/g, "<br>")
                    .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>")
                    .replace(/\*(.*?)\*/g, "<i>$1</i>");
            }

            // TYPE EFFECT
            function typeEffect(element, html, speed = 15) {
                element.innerHTML = "";

                let temp = document.createElement("div");
                temp.innerHTML = html;

                let nodes = Array.from(temp.childNodes);
                let i = 0;

                function typeNode() {
                    if (i >= nodes.length) return;

                    let node = nodes[i];

                    if (node.nodeType === 3) {
                        let text = node.textContent;
                        let j = 0;

                        let span = document.createElement("span");
                        element.appendChild(span);

                        function typeChar() {
                            if (j < text.length) {
                                span.textContent += text[j];
                                j++;
                                setTimeout(typeChar, speed);
                            } else {
                                i++;
                                typeNode();
                            }
                        }
                        typeChar();
                    } else {
                        element.appendChild(node.cloneNode(true));
                        i++;
                        typeNode();
                    }
                }

                typeNode();
            }

            // SEND MESSAGE
            function sendMsg() {
                let input = document.getElementById("msg");
                let msg = input.value.trim();
                if (!msg) return;

                addMessage(msg, "user");
                messages.push({ role: "user", content: msg });
                input.value = "";

                // TYPING DOTS
                let typingBubble = addMessage(
                    "<div class='typing-dots'><span>.</span><span>.</span><span>.</span></div>",
                    "bot"
                );

                fetch("/chatbot/", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-CSRFToken": getCookie("csrftoken")
                    },
                    body: JSON.stringify({ messages: messages })
                })
                .then(res => res.json())
                .then(data => {
                    let formatted = formatResponse(data.reply);

                    typingBubble.innerHTML = "";

                    setTimeout(() => {
                        typeEffect(typingBubble, formatted);
                    }, 300);

                    messages.push({ role: "assistant", content: data.reply });

                    showNotification();
                });
            }

            // CSRF
            function getCookie(name) {
                let cookieValue = null;
                document.cookie.split(';').forEach(c => {
                    c = c.trim();
                    if (c.startsWith(name + '=')) {
                        cookieValue = decodeURIComponent(c.substring(name.length + 1));
                    }
                });
                return cookieValue;
            }

            // AUTO WELCOME
            window.onload = function() {
                setTimeout(() => {
                    addMessage("👋 Welcome to ArtNexus! How can I help you?", "bot");
                }, 800);
            };
        </script>
    </body>
</html>
