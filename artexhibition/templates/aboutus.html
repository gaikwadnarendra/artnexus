{% extends 'base1.html' %}
{% load static %}

{% block content %}

<!-- BANNER -->
<section class="banner-area relative" id="home"
style="
background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)),
url('{% static 'img/pages/about-img.jpg' %}') center/cover no-repeat;
padding:100px 0;
text-align:center;
color:white;
animation: fadeDown 1s ease;
">

<style>
/* Animations */
@keyframes fadeDown {
  from {opacity:0; transform:translateY(-30px);}
  to {opacity:1; transform:translateY(0);}
}

@keyframes fadeUp {
  from {opacity:0; transform:translateY(40px);}
  to {opacity:1; transform:translateY(0);}
}

/* Text styling */
.banner-area h1 {
  font-size: 50px;
  font-weight: 700;
  letter-spacing: 2px;
}

.banner-area p a {
  color: #ccc;
  transition: 0.3s;
}

.banner-area p a:hover {
  color: #fff;
  text-decoration: underline;
}
</style>

<div class="container">
  <h1 style="color: #f1efef;">About Us</h1>
  <p>
    <a href="{% url 'index' %}">Home</a> → 
    <a href="{% url 'aboutus'%}">About Us</a>
  </p>
</div>
</section>


<!-- ABOUT SECTION -->
<section class="section-gap info-area" id="about"
style="padding:80px 20px;background:#0f0f0f;color:rgb(235, 229, 229);">

<div class="container">

  <!-- Title -->
  <div style="text-align:center;margin-bottom:50px;animation:fadeUp 1s ease;">
    <h1 style="font-size:40px;font-weight:700;color: #f1efef;">Few words about our Art Exhibition</h1>
    <p style="color:#f1efef;">Experience creativity in a modern digital space</p>
  </div>

  <!-- Content -->
  <div class="row align-items-center">

    <!-- Image -->
    <div class="col-lg-6 col-md-12 text-center"
         style="animation:fadeUp 1.2s ease;">
         
      <img src="{% static 'img/pages/about-img.jpg'%}" 
           style="
           width:100%;
           max-width:500px;
           border-radius:20px;
           box-shadow:0 15px 40px rgba(0,0,0,0.5);
           transition:0.5s;
           "
           onmouseover="this.style.transform='scale(1.05)'"
           onmouseout="this.style.transform='scale(1)'">
    </div>

    <!-- Text -->
    <div class="col-lg-6 col-md-12"
         style="animation:fadeUp 1.5s ease;">
      
      <div style="
      background: rgba(255,255,255,0.05);
      padding:30px;
      border-radius:20px;
      backdrop-filter: blur(10px);
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
      ">

        <h2 style="font-weight:600;margin-bottom:20px;color: #f1efef;">About Us</h2>

        <p style="color:#dfdada;line-height:1.8;">
          {{ page.aboutus }}
        </p>

      </div>

    </div>

  </div>

</div>
</section>

{% endblock %}
