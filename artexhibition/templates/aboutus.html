{% extends 'base1.html' %}
{% load static %}

{% block content %}

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Poppins', sans-serif; }

/* Animations */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(40px);} 
  to { opacity:1; transform:translateY(0);} 
}

@keyframes zoomIn {
  from { transform:scale(0.9); opacity:0; }
  to { transform:scale(1); opacity:1; }
}

/* Glass */
.glass {
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.1);
  border-radius: 15px;
}

/* ===== HERO ===== */
.hero-about {
  height: 60vh;
  background: linear-gradient(135deg,#1d2671,#c33764);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;
}

.hero-about h1 {
  font-size: 60px;
  font-weight: 700;
}

.hero-about p {
  margin-top: 10px;
  opacity: 0.9;
}

/* ===== ABOUT ===== */
.about-section {
  padding: 80px 20px;
  background: #f4f6f9;
}

.about-container {
  display: flex;
  gap: 50px;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
}

/* Image */
.about-img {
  width: 100%;
  max-width: 450px;
  border-radius: 20px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
  transition: 0.5s;
}

.about-img:hover {
  transform: scale(1.05);
}

/* Text Card */
.about-card {
  max-width: 500px;
  padding: 30px;
  animation: fadeUp 1.2s ease;
}

.about-card h2 {
  font-size: 32px;
  margin-bottom: 15px;
}

.about-card p {
  color: #555;
  line-height: 1.7;
}

/* ===== CTA ===== */
.cta {
  padding: 80px 20px;
  background: linear-gradient(135deg,#c33764,#1d2671);
  color: white;
  text-align: center;
}

.cta button {
  margin-top: 20px;
  padding: 12px 30px;
  border: none;
  border-radius: 30px;
  background: white;
  color: #c33764;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
}

.cta button:hover {
  transform: scale(1.1);
}

/* Responsive */
@media(max-width:768px){
  .hero-about h1 { font-size: 36px; }
}
</style>

<!-- HERO -->
<section class="hero-about">
  <div style="animation:fadeUp 1.5s ease;">
    <h1>About ArtNexus</h1>
    <p>Where creativity meets innovation</p>
  </div>
</section>

<!-- ABOUT -->
<section class="about-section">

  <div class="about-container">

    <!-- Image -->
    <div style="animation: zoomIn 1s ease;">
      <img src="{% static 'img/pages/about-img.jpg' %}" class="about-img">
    </div>

    <!-- Text -->
    <div class="about-card glass">
      <h2>Few words about our Art Exhibition</h2>
      <p>{{ page.aboutus }}</p>
    </div>

  </div>

</section>

<!-- CTA -->
<section class="cta">
  <h2>Join ArtNexus Today</h2>
  <p>Be part of the creative revolution.</p>
  <a href="{% url 'art_product_list' %}">
    <button>Explore Now</button>
  </a>
</section>

{% endblock %}
