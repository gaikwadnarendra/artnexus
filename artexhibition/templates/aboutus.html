{% extends 'base1.html' %}
{% load static %}

{% block content %}

<style>
/* Animations */
@keyframes fadeDown {
  from {opacity:0; transform:translateY(-30px);}
  to {opacity:1; transform:translateY(0);}
}

@keyframes fadeUp {
  from {opacity:0; transform:translateY(40px);}
  to {opacity:1; transform:translateY(0);}
}

/* Banner */
.banner-area {
  background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)),
    url('{% static "img/pages/about-img.jpg" %}') center/cover no-repeat;
  padding: 80px 20px;
  text-align: center;
  color: white;
  animation: fadeDown 1s ease;
}

.banner-area h1 {
  font-size: 42px;
  font-weight: 700;
  letter-spacing: 1px;
  color: #f1efef;
}

/* About Section */
.about-section {
  padding: 60px 20px;
  background: #0f0f0f;
  color: rgb(235, 229, 229);
}

.about-title h1 {
  font-size: 34px;
  font-weight: 700;
}

.about-img {
  width: 100%;
  max-width: 500px;
  border-radius: 20px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.5);
  transition: 0.5s;
}

.about-img:hover {
  transform: scale(1.05);
}

.about-card {
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* ✅ Mobile Fix */
@media (max-width: 768px) {

  .banner-area {
    padding: 50px 15px;
  }

  .banner-area h1 {
    font-size: 26px;
  }

  .about-section {
    padding: 40px 15px;
  }

  .about-title h1 {
    font-size: 22px;
  }

  .about-card {
    margin-top: 20px;
    padding: 18px;
  }

  /* Bootstrap margin fix */
  .mb-5 {
    margin-bottom: 20px !important;
  }
}

@media (max-width: 480px) {
  .banner-area h1 {
    font-size: 22px;
  }
}
</style>

<!-- BANNER -->
<section class="banner-area">
  <div class="container">
    <h1>About Us</h1>
    <p>
      <a href="{% url 'index' %}">Home</a> →
      <a href="{% url 'aboutus' %}">About Us</a>
    </p>
  </div>
</section>

<!-- ABOUT SECTION -->
<section class="about-section">
  <div class="container">

    <!-- Title -->
    <div class="about-title text-center mb-5" style="animation: fadeUp 1s ease;">
      <h1>Few words about our Art Exhibition</h1>
      <p style="color:#f1efef;">Experience creativity in a modern digital space</p>
    </div>

    <!-- Content -->
    <div class="row align-items-center">

      <!-- Image -->
      <div class="col-lg-6 col-md-12 text-center mb-4" style="animation: fadeUp 1.2s ease;">
        <img src="{% static 'img/pages/about-img.jpg' %}"
             class="about-img"
             alt="About ArtNexus">
      </div>

      <!-- Text -->
      <div class="col-lg-6 col-md-12" style="animation: fadeUp 1.5s ease;">
        <div class="about-card">
          <h2 style="font-weight:600; margin-bottom:15px;">About Us</h2>
          <p style="color:#dfdada; line-height:1.7;">
            {{ page.aboutus }}
          </p>
        </div>
      </div>

    </div>
  </div>
</section>

{% endblock %}
