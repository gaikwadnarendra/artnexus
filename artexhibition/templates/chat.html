<!DOCTYPE html>
<html>
<head>
    <title>ArtNexus Chatbot</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f0f;
        }

        .chat-box {
            width: 400px;
            margin: 50px auto;
            background: #1a1a1a;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
        }

        h3 {
            text-align: center;
            color: white;
            margin-bottom: 10px;
        }

        .messages {
            height: 300px;
            overflow-y: auto;
            padding: 10px;
            background: #111;
            border-radius: 10px;
        }

        /* Chat bubbles */
        .user, .bot {
            padding: 10px 15px;
            margin: 8px 0;
            border-radius: 15px;
            max-width: 70%;
            animation: fadeIn 0.3s ease;
        }

        .user {
            background: #00ffcc;
            color: black;
            margin-left: auto;
            text-align: right;
        }

        .bot {
            background: #333;
            color: white;
            margin-right: auto;
        }

        /* Input area */
        .input-area {
            display: flex;
            margin-top: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: none;
            outline: none;
            background: #222;
            color: white;
        }

        input:focus {
            box-shadow: 0 0 10px rgba(0,255,204,0.4);
        }

        button {
            margin-left: 10px;
            padding: 10px 15px;
            border: none;
            border-radius: 50%;
            background: #00ffcc;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1);
            background: #00e6b8;
        }

        /* Scrollbar */
        .messages::-webkit-scrollbar {
            width: 5px;
        }
        .messages::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 10px;
        }

        /* Animation */
        @keyframes fadeIn {
            from {opacity:0; transform:translateY(10px);}
            to {opacity:1; transform:translateY(0);}
        }
    </style>
</head>

<body>

<div class="chat-box">

    <h3>🎨 ArtNexus AI Chatbot</h3>

    <div id="chat" class="messages"></div>

    <div class="input-area">
        <input type="text" id="msg" placeholder="Type message...">
        <button onclick="sendMsg()">➤</button>
    </div>

</div>

<script>
function sendMsg(){
    let msg = document.getElementById("msg").value;
    if(msg.trim() === "") return;

    let chat = document.getElementById("chat");

    // user message
    chat.innerHTML += "<div class='user'>"+ msg +"</div>";

    document.getElementById("msg").value = "";

    fetch("/chatbot/", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "message=" + msg
    })
    .then(res => res.json())
    .then(data => {
        chat.innerHTML += "<div class='bot'>"+ data.response +"</div>";
        chat.scrollTop = chat.scrollHeight;
    });
}
</script>

</body>
</html>
