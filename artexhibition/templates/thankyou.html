{% extends 'base1.html' %}
{% load static %}

{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f5f5f5;
}

/* BANNER */
.banner-area {
  background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6)),
              url("{% static 'img/u4.jpg' %}") center/cover no-repeat;
  padding: 90px 20px;
  text-align: center;
  color: white;
}

.banner-area h1 {
  font-size: 42px;
  font-weight: 700;
}

/* SECTION */
.thankyou-section {
  padding: 80px 20px;
}

/* CARD */
.thankyou-card {
  background: white;
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

/* ICON */
.success-icon {
  font-size: 60px;
  color: #c33764;
  margin-bottom: 10px;
}

/* TEXT */
.enquiry-number {
  font-size: 18px;
  color: #555;
}

.enquiry-number strong {
  color: #c33764;
}

/* BUTTON */
.btn-main {
  display: inline-block;
  margin-top: 20px;
  background: #c33764;
  color: white;
  padding: 12px 28px;
  border-radius: 25px;
  text-decoration: none;
  font-weight: 600;
}

.btn-main:hover {
  background: #a82d55;
}

/* MOBILE */
@media (max-width:768px) {
  .banner-area h1 {
    font-size: 28px;
  }

  .thankyou-card {
    padding: 25px;
  }

  .success-icon {
    font-size: 45px;
  }
}
</style>

<!-- BANNER -->
<section class="banner-area">
  <div class="container">
    <h1 style="color: white;">Thank You</h1>
    <p>
      <a href="{% url 'index' %}" style="color:#ddd;">Home</a> → Success
    </p>
  </div>
</section>

<!-- THANK YOU -->
<section class="thankyou-section">
  <div class="container">

    <div class="row justify-content-center">
      <div class="col-lg-7 col-md-9 col-sm-12">

        <div class="thankyou-card">

          <div class="success-icon">✔</div>

          <h2>Thank You!</h2>

          <p class="enquiry-number">
            Your enquiry number is 
            <strong>{{ enquirynumber }}</strong>
          </p>

          <p style="color:#777;">We will contact you soon.</p>

          <a href="{% url 'index' %}" class="btn-main">
            Back to Home
          </a>

        </div>

      </div>
    </div>

  </div>
</section>

{% endblock %}
