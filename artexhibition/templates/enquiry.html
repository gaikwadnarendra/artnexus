{% extends 'base1.html' %}
{% load static %}

{% block content %}

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Poppins', sans-serif; }

/* Animations */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(40px);} 
  to { opacity:1; transform:translateY(0);} 
}

/* ===== HERO ===== */
.hero-enquiry {
  height: 45vh;
  background: linear-gradient(135deg,#1d2671,#c33764);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;
}

.hero-enquiry h1 {
  font-size: 50px;
  font-weight: 700;
}

/* ===== SECTION ===== */
.enquiry-section {
  padding: 80px 20px;
  background: #f4f6f9;
}

/* Glass Card */
.glass {
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.6);
  border-radius: 20px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.1);
}

/* Title */
.enquiry-title h3 {
  font-size: 22px;
  font-weight: 600;
  color: #333;
}

/* Form */
.form-control {
  border-radius: 10px;
  padding: 12px;
  border: 1px solid #ddd;
  transition: 0.3s;
}

.form-control:focus {
  border-color: #c33764;
  box-shadow: 0 0 8px rgba(195,55,100,0.2);
}

/* Button */
.primary-btn {
  background: #c33764;
  color: white;
  border-radius: 25px;
  padding: 12px;
  font-weight: 600;
  transition: 0.3s;
  border: none;
  cursor: pointer;
  width: 100%;
}

.primary-btn:hover {
  transform: scale(1.05);
}

/* Responsive */
@media(max-width:768px){
  .hero-enquiry h1 { font-size: 32px; }
}
</style>

<!-- HERO -->
<section class="hero-enquiry">
  <div style="animation:fadeUp 1.5s ease;">
    <h1>Enquiry</h1>
  </div>
</section>

<!-- FORM -->
<section class="enquiry-section">

  <div class="container">

    <!-- Title -->
    <div class="enquiry-title text-center mb-4" style="animation: fadeUp 1s ease;">
      <h3>
        Enquiry For Product 
        ({{ sinprod.title }} : {{ sinprod.referencenumber }})
      </h3>
    </div>

    <div class="row justify-content-center">
      <div class="col-lg-8 col-md-10 col-sm-12" style="animation: fadeUp 1.3s ease;">

        <div class="glass p-4">

          <form action="{% url 'enquiry_details' %}" method="POST">
            {% csrf_token %}

            <input name="prod_id" type="hidden" value="{{ sinprod.id }}">

            <div class="row">

              <!-- LEFT -->
              <div class="col-lg-6 col-md-6 col-sm-12">
                
                <input name="fullname"
                       placeholder="Enter your name"
                       class="form-control mb-3"
                       required type="text">

                <input name="email"
                       placeholder="Enter email"
                       class="form-control mb-3"
                       required type="email">

                <input name="mobnum"
                       maxlength="10"
                       placeholder="Enter mobile number"
                       class="form-control mb-3"
                       required type="text">

              </div>

              <!-- RIGHT -->
              <div class="col-lg-6 col-md-6 col-sm-12">
                
                <textarea class="form-control mb-3"
                          name="message"
                          placeholder="Your Message"
                          required
                          style="height:150px;"></textarea>

                <button type="submit" class="primary-btn">
                  Send Enquiry
                </button>

              </div>

            </div>

          </form>

        </div>

      </div>
    </div>

  </div>

</section>

{% endblock %}
