{% extends 'base1.html' %}
{% load static %}

{% block content %}

<style>
@keyframes fadeDown {
  from {opacity:0; transform:translateY(-30px);}
  to {opacity:1; transform:translateY(0);}
}

@keyframes fadeUp {
  from {opacity:0; transform:translateY(40px);}
  to {opacity:1; transform:translateY(0);}
}

/* Banner */
.banner-area {
  background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)),
    url('{% static "img/banner.jpg" %}') center/cover no-repeat;
  padding: 100px 20px;
  text-align: center;
  color: white;
  animation: fadeDown 1s ease;
}

.banner-area h1 {
  font-size: 50px;
  font-weight: 700;
  color: #fff;
}

.banner-area p a {
  color: #ccc;
  transition: 0.3s;
}

.banner-area p a:hover {
  color: #fff;
  text-decoration: underline;
}

/* Form Section */
.enquiry-section {
  background: #0f0f0f;
  padding: 80px 20px;
  color: white;
}

/* Form Card */
.enquiry-card {
  background: #1a1a1a;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.5);
}

/* Input Styling */
.form-control {
  background: #1a1a1a;
  border: 1px solid #333;
  color: white;
  border-radius: 10px;
  padding: 10px;
  transition: 0.3s;
}

.form-control:focus {
  border-color: #00ffcc;
  box-shadow: 0 0 10px rgba(0,255,204,0.3);
  background: #1a1a1a;
  color: white;
}

/* Placeholder color */
.form-control::placeholder {
  color: #888;
}

/* Button */
.primary-btn {
  background: #00ffcc;
  color: #000 !important;
  border-radius: 25px;
  padding: 10px 25px;
  font-weight: 600;
  transition: 0.3s;
  border: none;
  cursor: pointer;
  width: 100%;
  margin-top: 10px;
}

.primary-btn:hover {
  transform: scale(1.05);
  background: #00e6b8;
}

/* Title */
.enquiry-title h3 {
  color: white;
  font-size: 22px;
  font-weight: 600;
}

/* ✅ Mobile Responsive */
@media (max-width: 768px) {
  .banner-area {
    padding: 70px 15px;
  }

  .banner-area h1 {
    font-size: 30px;
  }

  .enquiry-section {
    padding: 50px 15px;
  }

  .enquiry-card {
    padding: 20px;
  }

  .enquiry-title h3 {
    font-size: 18px;
  }
}

@media (max-width: 480px) {
  .banner-area h1 {
    font-size: 24px;
  }

  .enquiry-title h3 {
    font-size: 16px;
  }
}
</style>

<!-- BANNER -->
<section class="banner-area" id="home">
  <div class="container">
    <h1>Enquiry</h1>
    <p>
      <a href="{% url 'index' %}">Home</a> →
      <a href="#">Enquiry</a>
    </p>
  </div>
</section>

<!-- FORM -->
<section class="enquiry-section" id="enquiry">
  <div class="container">

    <!-- Title -->
    <div class="enquiry-title text-center mb-4" style="animation: fadeUp 1s ease;">
      <h3>Enquiry For Product ({{ sinprod.title }} : {{ sinprod.referencenumber }})</h3>
    </div>

    <div class="row justify-content-center">
      <div class="col-lg-8 col-md-10 col-sm-12" style="animation: fadeUp 1.3s ease;">

        <div class="enquiry-card">

          <form action="{% url 'enquiry_details' %}" method="POST">
            {% csrf_token %}

            <input name="prod_id" type="hidden" value="{{ sinprod.id }}">

            <div class="row">

              <!-- LEFT -->
              <div class="col-lg-6 col-md-6 col-sm-12">
                <div class="form-group">
                  <input name="fullname"
                         placeholder="Enter your name"
                         class="form-control mb-3"
                         required type="text">
                </div>

                <div class="form-group">
                  <input name="email"
                         placeholder="Enter email"
                         class="form-control mb-3"
                         required type="email">
                </div>

                <div class="form-group">
                  <input name="mobnum"
                         maxlength="10"
                         placeholder="Enter mobile number"
                         class="form-control mb-3"
                         required type="text">
                </div>
              </div>

              <!-- RIGHT -->
              <div class="col-lg-6 col-md-6 col-sm-12">
                <div class="form-group">
                  <textarea class="form-control mb-3"
                            name="message"
                            placeholder="Your Message"
                            required
                            style="height:150px;"></textarea>
                </div>

                <button type="submit" class="primary-btn">
                  Send Enquiry
                </button>
              </div>

            </div>

          </form>

        </div>
      </div>
    </div>

  </div>
</section>

{% endblock %}
