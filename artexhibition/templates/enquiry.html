{% extends 'base1.html' %}
{% load static %}

{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f5f5f5;
}

/* BANNER */
.banner-area {
  background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6)),
              url("{% static 'img/u4.jpg' %}") center/cover no-repeat;
  padding: 90px 20px;
  text-align: center;
  color: white;
}

.banner-area h1 {
  font-size: 42px;
  font-weight: 700;
}

/* SECTION */
.enquiry-section {
  padding: 70px 20px;
}

/* CARD */
.enquiry-card {
  background: white;
  padding: 35px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

/* TITLE */
.enquiry-title h3 {
  text-align: center;
  margin-bottom: 25px;
}

/* INPUT */
.form-control {
  border-radius: 12px;
  padding: 12px;
  border: 1px solid #ddd;
  transition: 0.3s;
}

.form-control:focus {
  border-color: #c33764;
  box-shadow: 0 0 8px rgba(195,55,100,0.2);
}

/* BUTTON */
.btn-main {
  background: #c33764;
  color: white;
  border-radius: 25px;
  padding: 12px;
  font-weight: 600;
  border: none;
  width: 100%;
}

.btn-main:hover {
  background: #a82d55;
}

/* MOBILE */
@media(max-width:768px){
  .banner-area h1 {
    font-size: 28px;
  }
}
</style>

<!-- BANNER -->
<section class="banner-area">
  <div class="container">
    <h1>Enquiry</h1>
    <p>
      <a href="{% url 'index' %}" style="color:#ddd;">Home</a> → Enquiry
    </p>
  </div>
</section>

<!-- FORM -->
<section class="enquiry-section">
  <div class="container">

    <div class="row justify-content-center">
      <div class="col-lg-8 col-md-10 col-sm-12">

        <div class="enquiry-card">

          <div class="enquiry-title">
            <h3>
              Enquiry For Product <br>
              <span style="color:#c33764;">
                {{ sinprod.title }} ({{ sinprod.referencenumber }})
              </span>
            </h3>
          </div>

          <form action="{% url 'enquiry_details' %}" method="POST">
            {% csrf_token %}

            <input name="prod_id" type="hidden" value="{{ sinprod.id }}">

            <div class="row">

              <!-- LEFT -->
              <div class="col-lg-6">

                <input name="fullname"
                       placeholder="Enter your name"
                       class="form-control mb-3"
                       required type="text">

                <input name="email"
                       placeholder="Enter email"
                       class="form-control mb-3"
                       required type="email">

                <input name="mobnum"
                       maxlength="10"
                       placeholder="Enter mobile number"
                       class="form-control mb-3"
                       required type="text">

              </div>

              <!-- RIGHT -->
              <div class="col-lg-6">

                <textarea class="form-control mb-3"
                          name="message"
                          placeholder="Your message"
                          required
                          style="height:150px;"></textarea>

                <button type="submit" class="btn-main">
                  Send Enquiry
                </button>

              </div>

            </div>

          </form>

        </div>

      </div>
    </div>

  </div>
</section>

{% endblock %}
