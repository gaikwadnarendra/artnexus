{% extends 'base1.html' %}
{% load static %}

{% block content %}

<!-- BANNER -->
<section class="banner-area relative" id="home"
style="
background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)),
url('{% static 'img/banner.jpg' %}') center/cover no-repeat;
padding:100px 0;
text-align:center;
color:white;
animation: fadeDown 1s ease;
">

<style>
@keyframes fadeDown {
  from {opacity:0; transform:translateY(-30px);}
  to {opacity:1; transform:translateY(0);}
}

@keyframes fadeUp {
  from {opacity:0; transform:translateY(40px);}
  to {opacity:1; transform:translateY(0);}
}

/* Input Styling */
.form-control {
  background: #1a1a1a;
  border: 1px solid #333;
  color: white;
  border-radius: 10px;
  padding: 10px;
  transition: 0.3s;
}

.form-control:focus {
  border-color: #00ffcc;
  box-shadow: 0 0 10px rgba(0,255,204,0.3);
  background: #1a1a1a;
  color: white;
}

/* Button */
.primary-btn {
  background: #00ffcc;
  color: #000 !important;
  border-radius: 25px;
  padding: 10px 25px;
  font-weight: 600;
  transition: 0.3s;
}

.primary-btn:hover {
  transform: scale(1.1);
  background: #00e6b8;
}

/* Title */
.title h3 {
  color: white;
}
</style>

<div class="container">
  <h1 style="font-size:50px;font-weight:700; color:#fff;">Enquiry</h1>
  <p>
    <a href="{% url 'index' %}" style="color:#ccc;">Home</a> →
    <a href="#" style="color:#fff;">Enquiry</a>
  </p>
</div>
</section>


<!-- FORM -->
<section class="contact-page-area section-gap"
style="background:#0f0f0f;padding:80px 20px;color:white;">

<div class="container">

  <!-- Title -->
  <div class="title text-center"
       style="animation:fadeUp 1s ease;">
    
    <h3 class="mb-10">
      Enquiry For Product ({{sinprod.title}} : {{sinprod.referencenumber}})
    </h3>
  </div>

  <div class="row justify-content-center">

    <div class="col-lg-8"
         style="animation:fadeUp 1.3s ease;">

      <div style="
      background:#1a1a1a;
      padding:30px;
      border-radius:20px;
      box-shadow:0 15px 40px rgba(0,0,0,0.5);
      ">

        <form action="{% url 'enquiry_details' %}" method="POST">
          {% csrf_token %}

          <div class="row">

            <!-- LEFT -->
            <div class="col-lg-6 form-group">

              <input name="fullname"
                     placeholder="Enter your name"
                     class="form-control mb-3"
                     required type="text">

              <input name="prod_id"
                     type="hidden"
                     value="{{sinprod.id}}">

              <input name="email"
                     placeholder="Enter email"
                     class="form-control mb-3"
                     required type="email">

              <input name="mobnum"
                     maxlength="10"
                     placeholder="Enter mobile number"
                     class="form-control mb-3"
                     required type="text">

            </div>

            <!-- RIGHT -->
            <div class="col-lg-6 form-group">

              <textarea class="form-control mb-3"
                        name="message"
                        placeholder="Your Message"
                        required
                        style="height:150px;"></textarea>

              <button class="primary-btn mt-2" style="float:right;">
                Send Enquiry
              </button>

            </div>

          </div>

        </form>

      </div>

    </div>

  </div>

</div>
</section>

{% endblock %}
