{% extends 'base1.html' %}
{% load static %}

{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f5f5f5;
}

/* BANNER */
.banner-area {
  background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6)),
              url("{% static 'img/u4.jpg' %}") center/cover no-repeat;
  padding: 100px 20px;
  text-align: center;
  color: white;
}

.banner-area h1 {
  font-size: 45px;
  font-weight: 700;
}

.banner-area p {
  font-size: 14px;
}

.banner-area a {
  color: #ddd;
  text-decoration: none;
}

.banner-area a:hover {
  text-decoration: underline;
}

/* SECTION */
.register-section {
  padding: 80px 20px;
}

/* CARD */
.register-card {
  background: white;
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.register-card h2 {
  text-align: center;
  font-weight: 700;
  margin-bottom: 25px;
  color: #333;
}

/* INPUT */
.form-group label {
  font-size: 14px;
  color: #555;
}

.form-control {
  border-radius: 12px;
  padding: 12px 15px;
  border: 1px solid #ddd;
  transition: 0.3s;
}

.form-control:focus {
  border-color: #c33764;
  box-shadow: 0 0 8px rgba(195,55,100,0.2);
}

/* BUTTON */
.register-btn {
  width: 100%;
  padding: 12px;
  border-radius: 25px;
  background: #c33764;
  border: none;
  color: white;
  font-weight: 600;
  transition: 0.3s;
}

.register-btn:hover {
  background: #a82d55;
  transform: scale(1.02);
}

/* ALERT */
.alert {
  border-radius: 10px;
}

/* LINK */
.text-link {
  color: #c33764;
  font-weight: 600;
  text-decoration: none;
}

.text-link:hover {
  text-decoration: underline;
}

/* MOBILE */
@media (max-width:768px) {
  .banner-area h1 {
    font-size: 28px;
  }

  .register-card {
    padding: 25px;
  }
}
</style>

<!-- BANNER -->
<section class="banner-area">
  <div class="container">
    <h1 style="color: white;">Login</h1>
    <p>
      <a href="{% url 'index' %}">Home</a> → Login
    </p>
  </div>
</section>

<!-- LOGIN -->
<section class="register-section">
  <div class="container">

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }} text-center">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <div class="row justify-content-center">
      <div class="col-lg-5 col-md-7 col-sm-10">

        <div class="register-card">

          <h2>Welcome Back</h2>

          <form method="POST">
            {% csrf_token %}

            <div class="form-group mb-3">
              <label>Email Address</label>
              <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
            </div>

            <div class="form-group mb-3">
              <label>Password</label>
              <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>

            <button type="submit" class="register-btn">Login</button>

          </form>

          <p class="text-center mt-3">
            New user?
            <a href="{% url 'register' %}" class="text-link">Create account</a>
          </p>

        </div>

      </div>
    </div>

  </div>
</section>

{% endblock %}
