{% extends 'base1.html' %}
{% load static %}

{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
}

/* HERO */
.hero-contact {
  height: 40vh;
  background: url("{% static 'img/u4.jpg' %}") no-repeat center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  color: white;
}

.hero-contact::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

.hero-content {
  position: relative;
  z-index: 2;
  text-align: center;
}

.hero-content h1 {
  font-size: 42px;
}

/* SECTION */
.contact-section {
  padding: 70px 20px;
  background: #f8f9fa;
}

/* CONTAINER */
.contact-container {
  display: flex;
  gap: 40px;
  flex-wrap: wrap;
  justify-content: center;
}

/* LEFT INFO */
.contact-info {
  width: 320px;
}

.contact-card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

.contact-card h5 {
  margin-bottom: 5px;
  font-weight: 600;
}

.contact-card p {
  margin: 0;
  color: #555;
}

/* IMAGE */
.contact-img {
  max-width: 420px;
  width: 100%;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* CTA */
.cta {
  padding: 70px 20px;
  background: linear-gradient(135deg,#c33764,#1d2671);
  text-align: center;
  color: white;
}

.cta button {
  margin-top: 20px;
  padding: 10px 25px;
  border: none;
  border-radius: 20px;
  background: white;
  color: #c33764;
  font-weight: 600;
  cursor: pointer;
}

/* RESPONSIVE */
@media(max-width:768px){
  .hero-content h1 { font-size: 28px; }
}
</style>

<!-- HERO -->
<section class="hero-contact">
  <div class="hero-content">
    <h1>Contact Us</h1>
  </div>
</section>

<!-- CONTACT -->
<section class="contact-section">

  <div class="contact-container">

    <!-- LEFT INFO -->
    <div class="contact-info">

      <div class="contact-card">
        <h5>Address</h5>
        <p>{{ page.address|default:"Not available" }}</p>
      </div>

      <div class="contact-card">
        <h5>Phone</h5>
        <p>{{ page.mobilenumber|default:"Not available" }}</p>
      </div>

      <div class="contact-card">
        <h5>Email</h5>
        <p>{{ page.email|default:"Not available" }}</p>
      </div>

    </div>

    <!-- RIGHT IMAGE -->
    <div>
      <img src="{% static 'images/contact-art.jpg' %}" class="contact-img">
    </div>

  </div>

</section>

<!-- CTA -->
<section class="cta">
  <h2>Let’s Connect</h2>
  <p>We’d love to hear from you.</p>

  <a href="{% url 'art_product_list' %}">
    <button>Explore Art</button>
  </a>
</section>

{% endblock %}
