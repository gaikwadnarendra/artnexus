{% extends 'base1.html' %}
{% load static %}

{% block content %}

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Poppins', sans-serif; }

/* Animations */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(40px);} 
  to { opacity:1; transform:translateY(0);} 
}

@keyframes zoomIn {
  from { transform:scale(0.9); opacity:0; }
  to { transform:scale(1); opacity:1; }
}

/* Glass */
.glass {
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.1);
  border-radius: 15px;
}

/* ===== HERO ===== */
.hero-contact {
  height: 50vh;
  background: linear-gradient(135deg,#1d2671,#c33764);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;
}

.hero-contact h1 {
  font-size: 55px;
  font-weight: 700;
}

/* ===== CONTACT ===== */
.contact-section {
  padding: 80px 20px;
  background: #f4f6f9;
}

.contact-container {
  display: flex;
  gap: 40px;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
}

/* Left Info */
.contact-info {
  max-width: 350px;
  width: 100%;
}

.contact-card {
  padding: 20px;
  margin-bottom: 20px;
  transition: 0.3s;
  animation: fadeUp 1s ease;
}

.contact-card:hover {
  transform: translateY(-5px);
}

.contact-card h5 {
  font-weight: 600;
  margin-bottom: 5px;
}

.contact-card p {
  color: #555;
  margin: 0;
}

/* Image */
.contact-img {
  width: 100%;
  max-width: 500px;
  border-radius: 20px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
  transition: 0.5s;
}

.contact-img:hover {
  transform: scale(1.05);
}

/* CTA */
.cta {
  padding: 80px 20px;
  background: linear-gradient(135deg,#c33764,#1d2671);
  color: white;
  text-align: center;
}

.cta button {
  margin-top: 20px;
  padding: 12px 30px;
  border: none;
  border-radius: 30px;
  background: white;
  color: #c33764;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
}

.cta button:hover {
  transform: scale(1.1);
}

/* Responsive */
@media(max-width:768px){
  .hero-contact h1 { font-size: 32px; }
}
</style>

<!-- HERO -->
<section class="hero-contact">
  <div style="animation:fadeUp 1.5s ease;">
    <h1>Contact Us</h1>
  </div>
</section>

<!-- CONTACT -->
<section class="contact-section">

  <div class="contact-container">

    <!-- LEFT -->
    <div class="contact-info">

      <div class="contact-card glass">
        <h5>📍 Address</h5>
        <p>{{ page.address }}</p>
      </div>

      <div class="contact-card glass">
        <h5>📞 Phone</h5>
        <p>{{ page.mobilenumber }}</p>
      </div>

      <div class="contact-card glass">
        <h5>✉️ Email</h5>
        <p>{{ page.email }}</p>
      </div>

    </div>

    <!-- RIGHT IMAGE -->
    <div style="animation: zoomIn 1s ease;">
      <img src="{% static 'img/pages/about-img.jpg' %}" class="contact-img">
    </div>

  </div>

</section>

<!-- CTA -->
<section class="cta">
  <h2>Let's Connect</h2>
  <p>We’d love to hear from you.</p>
  <a href="{% url 'art_product_list' %}">
    <button>Explore Art</button>
  </a>
</section>

{% endblock %}
