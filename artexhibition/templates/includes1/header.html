{% load static %}

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
}

@keyframes fadeDown {
  from { opacity:0; transform: translateY(-30px); }
  to { opacity:1; transform: translateY(0); }
}

@keyframes fadeUp {
  from { opacity:0; transform: translateY(20px); }
  to { opacity:1; transform: translateY(0); }
}

/* ✅ Header */
#header {
  background: rgba(0, 0, 0, 0.75);
  position: sticky;
  top: 0;
  z-index: 999;
  backdrop-filter: blur(10px);
  box-shadow: 0 5px 25px rgba(0,0,0,0.5);
  animation: fadeDown 0.8s ease;
  padding: 15px 0;
}

/* ✅ Logo */
#logo a {
  font-family: 'Poppins', sans-serif;
  font-weight: 700;
  font-size: 28px;
  letter-spacing: 2px;
  color: #fff;
  text-decoration: none;
  transition: 0.3s;
  display: inline-block;
}

#logo a:hover {
  transform: scale(1.08);
  text-shadow: 0 0 10px rgba(255,255,255,0.6);
}

/* ✅ Nav Menu - Desktop */
.nav-menu {
  display: flex;
  gap: 25px;
  align-items: center;
  list-style: none;
  margin: 0;
  padding: 0;
}

.nav-menu li {
  animation: fadeUp 0.6s ease;
  transition: 0.3s;
  position: relative;
}

.nav-menu li:hover {
  transform: translateY(-3px);
}

.nav-menu li a {
  position: relative;
  color: #fff;
  font-weight: 500;
  letter-spacing: 0.5px;
  transition: 0.3s;
  text-decoration: none;
  white-space: nowrap;
}

.nav-menu li a:hover {
  color: #aaa;
  text-shadow: 0 0 8px rgba(255,255,255,0.5);
}

/* Underline animation */
.nav-menu li a::after {
  content: "";
  position: absolute;
  width: 0%;
  height: 2px;
  background: #fff;
  left: 0;
  bottom: -6px;
  transition: 0.3s;
}

.nav-menu li a:hover::after {
  width: 100%;
}

/* ✅ Dropdown */
.menu-has-children {
  position: relative;
}

.menu-has-children > a::after {
  display: none !important;
  content: none !important;
}

.menu-has-children ul {
  position: absolute;
  top: 100%;
  left: 0;
  background: #1a1a1a;
  border-radius: 12px;
  min-width: 160px;
  padding: 10px 0;
  list-style: none;
  opacity: 0;
  visibility: hidden;
  transform: translateY(10px);
  transition: 0.3s;
  z-index: 1000;
}

.menu-has-children:hover ul {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}

.menu-has-children ul li a {
  color: #ddd;
  padding: 8px 15px;
  display: block;
  transition: 0.3s;
  font-size: 14px;
}

.menu-has-children ul li a:hover {
  background: #333;
  color: #fff;
  padding-left: 20px;
}

/* ✅ Hamburger Button */
.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 5px;
}

.hamburger span {
  display: block;
  width: 25px;
  height: 3px;
  background: #fff;
  border-radius: 3px;
  transition: 0.3s;
}

/* Hamburger → X animation */
.hamburger.active span:nth-child(1) {
  transform: translateY(8px) rotate(45deg);
}

.hamburger.active span:nth-child(2) {
  opacity: 0;
}

.hamburger.active span:nth-child(3) {
  transform: translateY(-8px) rotate(-45deg);
}

/* ✅ Mobile Menu */
@media (max-width: 768px) {
  .hamburger {
    display: flex;
  }

  #nav-menu-container {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    width: 100%;
    background: rgba(46, 45, 45, 0.95);
    backdrop-filter: blur(10px);
    padding: 20px;
    z-index: 998;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  #nav-menu-container.open {
    display: block;
    animation: fadeUp 0.3s ease;
  }

  .nav-menu {
    flex-direction: column;
    align-items: flex-start;
    gap: 5px;
  }

  .nav-menu li {
    width: 100%;
    border-bottom: 1px solid #222;
    padding: 8px 0;
  }

  .nav-menu li:last-child {
    border-bottom: none;
  }

  .nav-menu li a {
    font-size: 16px;
    display: block;
    padding: 5px 0;
  }

  /* Mobile Dropdown */
  .menu-has-children ul {
    position: static;
    opacity: 1;
    visibility: visible;
    transform: none;
    background: #111;
    border-radius: 8px;
    margin-top: 8px;
    display: none;
    padding: 5px 0;
  }

  .menu-has-children.open ul {
    display: block;
  }

  .menu-has-children ul li {
    border-bottom: none;
    padding: 0;
  }

  .menu-has-children ul li a {
    font-size: 14px;
    padding: 8px 15px;
    color: #bbb;
  }

  #logo a {
    font-size: 22px;
  }
}

@media (max-width: 480px) {
  #logo a {
    font-size: 20px;
  }
}
</style>

<header id="header">
  <div class="container">
    <div class="row align-items-center justify-content-between d-flex" style="position:relative;">

      <!-- Logo -->
      <div id="logo">
        <a href="{% url 'index' %}" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
          
          <img src="{% static 'img/logo.png' %}" 
              alt="ArtNexus Logo"
              style="height:45px;">

          <span style="font-size:20px;font-weight:700;color:#c33764;">
            ArtNexus
          </span>

        </a>
      </div>

      <!-- ✅ Hamburger Button (Mobile Only) -->
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <!-- Navigation -->
      <nav id="nav-menu-container">
        <ul class="nav-menu">

          <li class="menu-active">
            <a href="{% url 'index' %}">Home</a>
          </li>

          <li>
            <a href="{% url 'aboutus' %}">About</a>
          </li>

          <li>
            <a href="{% url 'art_product_list' %}">Art Product</a>
          </li>

          <li>
            <a href="{% url 'contactus' %}">Contact</a>
          </li>

          <!-- Art Type Dropdown -->
          <li class="menu-has-children" id="artTypeMenu">
            <a href="#">Art Type ▼</a>
            <ul>
              {% for arttype in arttypes %}
              <li>
                <a href="{% url 'arttype_detail' id=arttype.id %}">
                  {{ arttype.arttype }}
                </a>
              </li>
              {% endfor %}
            </ul>
          </li>
          {% if user.is_authenticated %}
            <li>
              <a href="{% url 'wishlist' %}">❤️ Wishlist</a>
            </li>
            <li>
              <a href="{% url 'user_logout' %}">Logout</a>
            </li>
          {% else %}
            <li>
              <a href="{% url 'user_login' %}">Login</a>
            </li>
            <li>
              <a href="{% url 'register' %}">Register</a>
            </li>
          {% endif %}


        </ul>
      </nav>

    </div>
  </div>
</header>

<script>
  // Hamburger toggle
  const hamburger = document.getElementById('hamburger');
  const navMenu = document.getElementById('nav-menu-container');
  const artTypeMenu = document.getElementById('artTypeMenu');

  hamburger.addEventListener('click', () => {
    hamburger.classList.toggle('active');
    navMenu.classList.toggle('open');
  });

  // Mobile - Art Type dropdown toggle
  artTypeMenu.addEventListener('click', function(e) {
    if (window.innerWidth <= 768) {
      e.stopPropagation();
      this.classList.toggle('open');
    }
  });

  // Close menu on link click (mobile)
  document.querySelectorAll('.nav-menu li a').forEach(link => {
    link.addEventListener('click', () => {
      if (window.innerWidth <= 768) {
        hamburger.classList.remove('active');
        navMenu.classList.remove('open');
      }
    });
  });
</script>
