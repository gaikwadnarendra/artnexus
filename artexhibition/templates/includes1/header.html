{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

<title>ArtNexus</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="{% static 'css/bootstrap.css'%}">
<link rel="stylesheet" href="{% static 'css/main.css'%}">

<style>
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    background: #f8f9fa;
    overflow-x: hidden;
}

/* ===== CHAT BUTTON ===== */
#chat-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: linear-gradient(45deg, #10a37f, #0ea5e9);
    color: white;
    font-size: 20px;
    padding: 14px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 999;
}

/* ===== CHAT BOX ===== */
#chat-box {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 340px;
    height: 480px;
    background: white;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;

    opacity: 0;
    transform: translateY(20px);
    transition: 0.3s;
    pointer-events: none;

    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

#chat-box.active {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
}

#chat-header {
    background: #111;
    color: white;
    padding: 10px;
    font-weight: 600;
    display: flex;
    justify-content: space-between;
}

#chat-body {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    background: #f1f5f9;
}

#chat-footer {
    display: flex;
    border-top: 1px solid #ddd;
}

#chat-footer input {
    flex: 1;
    padding: 10px;
    border: none;
}

#chat-footer button {
    background: #10a37f;
    border: none;
    padding: 10px;
    color: white;
}

/* MESSAGE */
.msg {
    margin: 8px 0;
    display: flex;
}

.user { justify-content: flex-end; }
.bot { justify-content: flex-start; }

.bubble {
    padding: 8px 12px;
    border-radius: 10px;
    max-width: 75%;
    font-size: 13px;
}

.user .bubble {
    background: #10a37f;
    color: white;
}

.bot .bubble {
    background: #e2e8f0;
}

/* ===== TOAST ===== */
#toast-container {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 9999;
}

.toast {
    background: white;
    color: #333;
    padding: 10px 14px;
    margin-bottom: 10px;
    border-radius: 8px;
    min-width: 220px;
    display: flex;
    gap: 8px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.15);
}

.toast.success { border-left: 4px solid #10a37f; }
.toast.error { border-left: 4px solid red; }
.toast.warning { border-left: 4px solid orange; }
</style>

</head>

<body>

{% include 'includes1/header.html' %}

<main>
    {% block content %}{% endblock %}
</main>

{% include 'includes1/footer.html' %}

<!-- JS -->
<script src="{% static 'js/vendor/jquery-2.2.4.min.js'%}"></script>
<script src="{% static 'js/vendor/bootstrap.min.js'%}"></script>

<!-- CHAT BUTTON -->
<div id="chat-btn" onclick="toggleChat()">💬</div>

<!-- CHAT BOX -->
<div id="chat-box">
    <div id="chat-header">
        ArtNexus Bot
        <span onclick="toggleChat()">✖</span>
    </div>

    <div id="chat-body"></div>

    <div id="chat-footer">
        <input type="text" id="msg" placeholder="Type message...">
        <button onclick="sendMsg()">Send</button>
    </div>
</div>

<script>
let messages = [];

// ENTER KEY
document.addEventListener("DOMContentLoaded", function(){
    let input = document.getElementById("msg");
    if(input){
        input.addEventListener("keypress", function(e){
            if(e.key === "Enter") sendMsg();
        });
    }
});

// TOGGLE CHAT
function toggleChat() {
    document.getElementById("chat-box").classList.toggle("active");
}

// ADD MESSAGE
function addMessage(content, type) {
    let chat = document.getElementById("chat-body");

    let msgDiv = document.createElement("div");
    msgDiv.classList.add("msg", type);

    let bubble = document.createElement("div");
    bubble.classList.add("bubble");
    bubble.innerHTML = content;

    msgDiv.appendChild(bubble);
    chat.appendChild(msgDiv);
    chat.scrollTop = chat.scrollHeight;

    return bubble;
}

// SEND MESSAGE (OLD WORKING FORMAT)
function sendMsg() {
    let input = document.getElementById("msg");
    let msg = input.value.trim();

    if (!msg) return;

    addMessage(msg, "user");

    messages.push({
        role: "user",
        content: msg
    });

    input.value = "";

    let typing = addMessage("Typing...", "bot");

    fetch("/chatbot/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCookie("csrftoken")
        },
        body: JSON.stringify({
            messages: messages   // ✅ OLD WORKING
        })
    })
    .then(res => res.json())
    .then(data => {
        typing.innerHTML = data.reply;

        messages.push({
            role: "assistant",
            content: data.reply
        });
    });
}

// CSRF
function getCookie(name) {
    let cookieValue = null;
    document.cookie.split(';').forEach(c => {
        c = c.trim();
        if (c.startsWith(name + '=')) {
            cookieValue = decodeURIComponent(c.substring(name.length + 1));
        }
    });
    return cookieValue;
}

// TOAST
function showToast(message, type="success") {
    let container = document.getElementById("toast-container");

    let toast = document.createElement("div");
    toast.classList.add("toast", type);

    toast.innerHTML = `<div>${message}</div>`;

    container.appendChild(toast);

    setTimeout(() => toast.remove(), 2500);
}
</script>

{% if messages %}
<script>
document.addEventListener("DOMContentLoaded", function () {
    {% for message in messages %}
        showToast("{{ message|escapejs }}", "{{ message.tags }}");
    {% endfor %}
});
</script>
{% endif %}

<div id="toast-container"></div>

</body>
</html>
