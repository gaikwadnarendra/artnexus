{% load static %}
<header id="header" id="home"style="
background: rgba(255, 255, 255, 0.26)
position: sticky;
top: 0;
z-index: 999;
backdrop-filter: blur(10px);
box-shadow: 0 5px 25px rgba(0,0,0,0.5);
animation: fadeDown 0.8s ease;
">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
}

/* Header animation */
@keyframes fadeDown {
  from { opacity:0; transform: translateY(-30px); }
  to { opacity:1; transform: translateY(0); }
}

/* Nav animation */
.nav-menu li {
  animation: fadeUp 0.6s ease;
}

@keyframes fadeUp {
  from { opacity:0; transform: translateY(20px); }
  to { opacity:1; transform: translateY(0); }
}

/* Links */
.nav-menu li a {
  position: relative;
  color: #fff;
  font-weight: 500;
  letter-spacing: 0.5px;
  transition: 0.3s;
}

/* Glow hover */
.nav-menu li a:hover {
  color: #aaa;
  text-shadow: 0 0 8px rgba(255,255,255,0.5);
}

/* Underline animation */
.nav-menu li a::after {
  content: "";
  position: absolute;
  width: 0%;
  height: 2px;
  background: #fff;
  left: 0;
  bottom: -6px;
  transition: 0.3s;
}

.nav-menu li a:hover::after {
  width: 100%;
}

/* Dropdown animation */
.menu-has-children ul {
  background: #1a1a1a;
  border-radius: 12px;
  display: none;
  padding: 10px 0;
  transform: translateY(10px);
  opacity: 0;
  transition: 0.3s;
}

.menu-has-children:hover ul {
  display: block;
  transform: translateY(0);
  opacity: 1;
}

.menu-has-children > a::after {
    display: none !important;
    content: none !important;
}
/* Dropdown items */
.menu-has-children ul li a {
  color: #ddd;
  padding: 8px 15px;
  display: block;
  transition: 0.3s;
}

.menu-has-children ul li a:hover {
  background: #333;
  color: #fff;
  padding-left: 20px;
}

/* Logo styling */
#logo a {
  font-family: 'Poppins', sans-serif;
  font-weight: 700;
  font-size: 30px;
  letter-spacing: 2px;
  color: #fff;
  transition: 0.3s;
}

/* Logo glow */
#logo a:hover {
  transform: scale(1.08);
  text-shadow: 0 0 10px rgba(255,255,255,0.6);
}

/* Menu layout */
.nav-menu {
  display: flex;
  gap: 28px;
  align-items: center;
}

/* Lift effect */
.nav-menu li {
  transition: 0.3s;
}

.nav-menu li:hover {
  transform: translateY(-3px);
}
</style>

<div class="container">
  <div class="row align-items-center justify-content-between d-flex">
    
    <!-- Logo -->
    <div id="logo">
      <a href="{% url 'index' %}">ArtNexus</a>
    </div>

    <!-- Navigation -->
    <nav id="nav-menu-container">
      <ul class="nav-menu">
        
        <li class="menu-active">
          <a href="{% url 'index' %}">Home</a>
        </li>

        <li>
          <a href="{% url 'aboutus' %}">About</a>
        </li>

        <li>
          <a href="{% url 'art_product_list' %}">Art Product</a>
        </li>

        <li>
          <a href="{% url 'contactus' %}">Contact</a>
        </li>

        <li class="menu-has-children">
          <a href="#">Art Type ▼</a>
          <ul>
            {% for arttype in arttypes %}
            <li>
              <a href="{% url 'arttype_detail' id=arttype.id %}">
                {{ arttype.arttype }}
              </a>
            </li>
            {% endfor %}
          </ul>
        </li>

      </ul>
    </nav>

  </div>
</div>
</header>
