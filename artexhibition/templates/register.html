{% extends 'base1.html' %}
{% load static %}

{% block content %}

<style>
@keyframes fadeDown {
  from {opacity:0; transform:translateY(-30px);}
  to {opacity:1; transform:translateY(0);}
}

@keyframes fadeUp {
  from {opacity:0; transform:translateY(40px);}
  to {opacity:1; transform:translateY(0);}
}

/* Banner */
.banner-area {
  background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)),
    url('{% static "img/banner.jpg" %}') center/cover no-repeat;
  padding: 100px 20px;
  text-align: center;
  color: white;
  animation: fadeDown 1s ease;
}

.banner-area h1 {
  font-size: 50px;
  font-weight: 700;
  color: #fff;
}

.banner-area p a {
  color: #ccc;
  transition: 0.3s;
}

.banner-area p a:hover {
  color: #fff;
  text-decoration: underline;
}

/* Register Section */
.register-section {
  background: #0f0f0f;
  padding: 80px 20px;
  color: white;
}

/* Card */
.register-card {
  background: #1a1a1a;
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.5);
}

.register-card h2 {
  font-weight: 700;
  color: #fff;
  margin-bottom: 25px;
  text-align: center;
}

/* Input */
.form-control {
  background: #111;
  border: 1px solid #333;
  color: white;
  border-radius: 10px;
  padding: 10px 15px;
  transition: 0.3s;
}

.form-control:focus {
  border-color: #00ffcc;
  box-shadow: 0 0 10px rgba(0,255,204,0.3);
  background: #111;
  color: white;
}

.form-control::placeholder {
  color: #888;
}

.form-label {
  color: #aaa;
  font-size: 14px;
  margin-bottom: 5px;
}

/* Button */
.register-btn {
  background: #00ffcc;
  color: #000;
  border: none;
  border-radius: 25px;
  padding: 12px;
  font-weight: 600;
  width: 100%;
  transition: 0.3s;
  cursor: pointer;
  font-size: 16px;
}

.register-btn:hover {
  background: #00e6b8;
  transform: scale(1.02);
}

.login-link {
  text-align: center;
  margin-top: 20px;
  color: #aaa;
  font-size: 14px;
}

.login-link a {
  color: #00ffcc;
  text-decoration: none;
  font-weight: 600;
}

.login-link a:hover {
  text-decoration: underline;
}

/* Mobile */
@media (max-width: 768px) {
  .banner-area {
    padding: 70px 15px;
  }

  .banner-area h1 {
    font-size: 30px;
  }

  .register-section {
    padding: 50px 15px;
  }

  .register-card {
    padding: 25px 20px;
  }
}

@media (max-width: 480px) {
  .banner-area h1 {
    font-size: 24px;
  }
}
</style>

<!-- BANNER -->
<section class="banner-area" id="home">
  <div class="container">
    <h1>Register</h1>
    <p>
      <a href="{% url 'index' %}">Home</a> →
      <a href="#">Register</a>
    </p>
  </div>
</section>

<!-- REGISTER SECTION -->
<section class="register-section">
  <div class="container">

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show text-center" role="alert">
          {{ message }}
          <button type="button" class="close" data-dismiss="alert">&times;</button>
        </div>
      {% endfor %}
    {% endif %}

    <div class="row justify-content-center">
      <div class="col-lg-6 col-md-8 col-sm-12" style="animation: fadeUp 1.2s ease;">

        <div class="register-card">
          <h2>Create Account 🎨</h2>

          <form method="POST" action="{% url 'register' %}">
            {% csrf_token %}

            <div class="form-group mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" name="fullname"
                     class="form-control"
                     placeholder="Enter your full name"
                     required>
            </div>

            <div class="form-group mb-3">
              <label class="form-label">Email Address</label>
              <input type="email" name="email"
                     class="form-control"
                     placeholder="Enter your email"
                     required>
            </div>

            <div class="form-group mb-3">
              <label class="form-label">Password</label>
              <input type="password" name="password"
                     class="form-control"
                     placeholder="Enter password"
                     required>
            </div>

            <div class="form-group mb-4">
              <label class="form-label">Confirm Password</label>
              <input type="password" name="confirm_password"
                     class="form-control"
                     placeholder="Confirm your password"
                     required>
            </div>

            <button type="submit" class="register-btn">
              Register Now
            </button>

          </form>

          <div class="login-link">
            Already have an account?
            <a href="{% url 'user_login' %}">Login here</a>
          </div>

        </div>
      </div>
    </div>

  </div>
</section>

{% endblock %}
