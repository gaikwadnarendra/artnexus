{% extends 'base1.html' %}
{% load static %}

{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f5f5f5;
}

/* HERO / BANNER */
.banner-area {
  background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6)),
              url("{% static 'img/u4.jpg' %}") center/cover no-repeat;
  padding: 100px 20px;
  text-align: center;
  color: white;
}

.banner-area h1 {
  font-size: 45px;
  font-weight: 700;
}

.banner-area p a {
  color: #ddd;
  text-decoration: none;
}

.banner-area p a:hover {
  text-decoration: underline;
}

/* REGISTER SECTION */
.register-section {
  padding: 80px 20px;
}

/* CARD */
.register-card {
  background: white;
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.register-card h2 {
  text-align: center;
  font-weight: 700;
  margin-bottom: 25px;
  color: #333;
}

/* INPUT */
.form-control {
  border-radius: 12px;
  padding: 12px 15px;
  border: 1px solid #ddd;
  transition: 0.3s;
}

.form-control:focus {
  border-color: #c33764;
  box-shadow: 0 0 8px rgba(195,55,100,0.2);
}

.form-label {
  font-size: 14px;
  color: #555;
}

/* BUTTON */
.register-btn {
  background: #c33764;
  color: white;
  border: none;
  border-radius: 25px;
  padding: 12px;
  font-weight: 600;
  width: 100%;
  transition: 0.3s;
}

.register-btn:hover {
  background: #a82d55;
  transform: scale(1.02);
}

/* LOGIN LINK */
.login-link {
  text-align: center;
  margin-top: 20px;
  color: #555;
}

.login-link a {
  color: #c33764;
  font-weight: 600;
  text-decoration: none;
}

.login-link a:hover {
  text-decoration: underline;
}

/* ALERT */
.alert {
  border-radius: 10px;
}

/* MOBILE */
@media (max-width:768px) {
  .banner-area h1 {
    font-size: 28px;
  }

  .register-card {
    padding: 25px;
  }
}
</style>

<!-- BANNER -->
<section class="banner-area">
  <div class="container">
    <h1>Create Account</h1>
    <p>
      <a href="{% url 'index' %}">Home</a> →
      <span>Register</span>
    </p>
  </div>
</section>

<!-- REGISTER -->
<section class="register-section">
  <div class="container">

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show text-center" role="alert">
          {{ message }}
          <button type="button" class="close" data-dismiss="alert">&times;</button>
        </div>
      {% endfor %}
    {% endif %}

    <div class="row justify-content-center">
      <div class="col-lg-6 col-md-8 col-sm-12">

        <div class="register-card">
          <h2>Join ArtNexus 🎨</h2>

          <form method="POST" action="{% url 'register' %}">
            {% csrf_token %}

            <div class="form-group mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" name="fullname"
                     class="form-control"
                     placeholder="Enter your full name"
                     required>
            </div>

            <div class="form-group mb-3">
              <label class="form-label">Email Address</label>
              <input type="email" name="email"
                     class="form-control"
                     placeholder="Enter your email"
                     required>
            </div>

            <div class="form-group mb-3">
              <label class="form-label">Password</label>
              <input type="password" name="password"
                     class="form-control"
                     placeholder="Enter password"
                     required>
            </div>

            <div class="form-group mb-4">
              <label class="form-label">Confirm Password</label>
              <input type="password" name="confirm_password"
                     class="form-control"
                     placeholder="Confirm your password"
                     required>
            </div>

            <button type="submit" class="register-btn">
              Register Now
            </button>

          </form>

          <div class="login-link">
            Already have an account?
            <a href="{% url 'user_login' %}">Login here</a>
          </div>

        </div>

      </div>
    </div>

  </div>
</section>

{% endblock %}
